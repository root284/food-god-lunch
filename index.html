<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>음식의 신 | 오늘의 운세 점심 추천</title>
  <meta name="description" content="오늘의 운세와 기분을 섞어 점심 메뉴를 추천하는 웹앱" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --ink: #fff7e8;
      --muted: #b9a99a;
      --paper: #16120f;
      --line: rgba(255, 247, 232, 0.16);
      --panel: rgba(24, 19, 17, 0.78);
      --panel-strong: rgba(255, 247, 232, 0.93);
      --red: #e05235;
      --green: #20a486;
      --gold: #e5b45d;
      --blue: #5b84d7;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.46);
      --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(229, 180, 93, 0.18), transparent 28%),
        radial-gradient(circle at 78% 24%, rgba(32, 164, 134, 0.2), transparent 30%),
        linear-gradient(145deg, rgba(132, 32, 22, 0.22), rgba(8, 39, 37, 0.2) 42%, rgba(9, 8, 10, 0) 72%),
        linear-gradient(180deg, rgba(9, 8, 10, 0.3), rgba(9, 8, 10, 0.72)),
        url("assets/mystic-oracle-bg.png") center top / cover fixed no-repeat,
        linear-gradient(180deg, #17100f 0%, #0d1215 48%, #16100e 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 247, 232, 0.1), transparent 26%),
        repeating-linear-gradient(115deg, rgba(255, 247, 232, 0.025) 0 1px, transparent 1px 78px);
      mix-blend-mode: screen;
      opacity: 0.78;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 52px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff7e8;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff0be, #d38b35 52%, #4b2517);
      color: #19110f;
      box-shadow: 0 12px 28px rgba(229, 180, 93, 0.24);
    }

    .hero {
      min-height: calc(100vh - 116px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
      gap: 48px;
      align-items: end;
      padding: 42px 0 22px;
    }

    .copy {
      max-width: 690px;
      padding-bottom: 42px;
      text-shadow: 0 2px 26px rgba(0, 0, 0, 0.62);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      background: rgba(255, 247, 232, 0.1);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #f2d49a;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(36px, 5.8vw, 68px);
      line-height: 1.05;
      margin: 0;
      letter-spacing: 0;
    }

    .lead {
      margin: 20px 0 0;
      font-size: clamp(17px, 2.2vw, 22px);
      line-height: 1.58;
      max-width: 610px;
      color: #dfd1bf;
      font-weight: 650;
    }

    .app-panel {
      position: relative;
      background: var(--panel);
      border: 1px solid rgba(255, 247, 232, 0.2);
      border-radius: 30px;
      box-shadow:
        0 0 0 8px rgba(255, 247, 232, 0.045),
        0 0 0 1px rgba(255, 247, 232, 0.12),
        var(--shadow);
      backdrop-filter: blur(22px);
      overflow: hidden;
      max-height: calc(100vh - 106px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(229, 180, 93, 0.45) transparent;
    }

    .panel-body {
      padding: 14px 16px 18px;
    }

    .fortune-stage {
      display: grid;
      gap: 14px;
    }

    .screen {
      display: grid;
      gap: 14px;
    }

    .screen[hidden] {
      display: none;
    }

    .god-carousel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #09080a;
      position: relative;
      overflow: hidden;
      min-height: 374px;
      touch-action: pan-y;
    }

    .god-track {
      display: flex;
      height: 100%;
      transition: transform 0.32s cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }

    .god-slide {
      min-width: 100%;
      min-height: 374px;
      position: relative;
      display: grid;
      align-items: end;
      background: #09080a;
    }

    .god-slide img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 12%;
    }

    .god-slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(32,25,22,0.04), rgba(32,25,22,0.1) 48%, rgba(32,25,22,0.84));
    }

    .god-caption {
      position: relative;
      z-index: 1;
      padding: 18px;
      color: #fffaf2;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.44);
    }

    .god-caption b {
      display: block;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .god-caption span {
      display: block;
      margin-top: 6px;
      color: rgba(255, 250, 242, 0.78);
      font-weight: 850;
    }

    .carousel-button {
      position: absolute;
      top: 50%;
      z-index: 2;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: rgba(255, 250, 242, 0.86);
      color: #201916;
      border: 1px solid rgba(255, 250, 242, 0.7);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      font-weight: 950;
    }

    .carousel-button.prev {
      position: absolute;
      left: 12px;
    }

    .carousel-button.next {
      right: 12px;
    }

    .god-dots {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 10px;
      display: flex;
      justify-content: center;
      gap: 7px;
      pointer-events: none;
    }

    .god-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 250, 242, 0.42);
    }

    .god-dot.active {
      width: 22px;
      border-radius: 999px;
      background: #fffaf2;
    }

    .god-lock {
      position: absolute;
      z-index: 3;
      top: 12px;
      right: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255, 250, 242, 0.88);
      color: #201916;
      border: 1px solid rgba(255, 250, 242, 0.74);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
    }

    .god-lock input {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: var(--accent);
    }

    .god-carousel.is-locked .carousel-button {
      opacity: 0.46;
      cursor: not-allowed;
    }

    .fortune-stage.is-cooking .god-carousel {
      animation: divineSteam 0.72s ease-in-out infinite alternate;
    }

    @keyframes divineSteam {
      to { filter: saturate(1.18) contrast(1.06); transform: translateY(-1px); }
    }

    .oracle-loading {
      min-height: 430px;
      border: 1px solid rgba(255, 247, 232, 0.18);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(9, 8, 10, 0.28), rgba(9, 8, 10, 0.86)),
        var(--loading-image) center 12% / cover no-repeat;
    }

    .oracle-loading::before {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 1px solid rgba(229, 180, 93, 0.34);
      background:
        conic-gradient(from 0deg, transparent, rgba(229, 180, 93, 0.72), transparent 34%),
        radial-gradient(circle, rgba(229, 180, 93, 0.1), transparent 58%);
      animation: oracleSpin 2.4s linear infinite;
      filter: drop-shadow(0 0 26px rgba(229, 180, 93, 0.22));
    }

    .oracle-loading::after {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 247, 232, 0.14), transparent 13%),
        repeating-conic-gradient(from 12deg, rgba(255, 247, 232, 0.14) 0 3deg, transparent 3deg 19deg);
      opacity: 0.38;
      animation: oraclePulse 1.2s ease-in-out infinite alternate;
    }

    .oracle-loading-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      justify-items: center;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.74);
    }

    .oracle-loading-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 247, 232, 0.12);
      border: 1px solid rgba(255, 247, 232, 0.24);
      font-size: 26px;
      box-shadow: 0 0 26px rgba(229, 180, 93, 0.24);
    }

    .oracle-loading h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .oracle-loading p {
      margin: 0;
      color: #dfd1bf;
      font-weight: 750;
      line-height: 1.5;
    }

    @keyframes oracleSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes oraclePulse {
      to { scale: 1.04; opacity: 0.56; }
    }

    .offering {
      display: grid;
      gap: 8px;
    }

    .offering label {
      color: #f2d49a;
      font-size: 13px;
      font-weight: 950;
    }

    .offering textarea {
      width: 100%;
      min-height: 74px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 247, 232, 0.1);
      color: var(--ink);
      resize: vertical;
      outline: none;
    }

    .quick-offerings {
      display: flex;
      flex-wrap: nowrap;
      gap: 7px;
      padding: 2px 0 4px;
    }

    .quick-offering {
      min-height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 247, 232, 0.1);
      color: #dfd1bf;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .saju-panel {
      border: 1px solid rgba(255, 247, 232, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 247, 232, 0.07);
      overflow: hidden;
    }

    .saju-panel summary {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      cursor: pointer;
      color: #f2d49a;
      font-size: 13px;
      font-weight: 950;
      list-style: none;
    }

    .saju-panel summary::-webkit-details-marker {
      display: none;
    }

    .saju-panel summary::after {
      content: "+";
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 247, 232, 0.12);
      color: #fff7e8;
      font-size: 16px;
      line-height: 1;
    }

    .saju-panel[open] summary::after {
      content: "−";
    }

    .saju-fields {
      display: grid;
      grid-template-columns: 1fr 0.8fr;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .saju-field {
      display: grid;
      gap: 6px;
    }

    .saju-field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .saju-field input {
      width: 100%;
      min-height: 42px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(9, 8, 10, 0.34);
      color: var(--ink);
      padding: 9px 10px;
      outline: none;
      color-scheme: dark;
    }

    .orb-wrap {
      height: 190px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 37%),
        linear-gradient(135deg, rgba(216, 71, 42, 0.13), rgba(15, 139, 111, 0.12), rgba(53, 107, 179, 0.12));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .orb {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.95), rgba(255,255,255,0.24) 18%, transparent 30%),
        conic-gradient(from 30deg, #efc56f, #d8472a, #356bb3, #0f8b6f, #efc56f);
      box-shadow:
        inset 0 -18px 34px rgba(32, 25, 22, 0.22),
        0 20px 40px rgba(32, 25, 22, 0.2);
      position: relative;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255,255,255,0.35), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.28);
    }

    .orb.spinning {
      animation: spin 1.1s linear infinite, pulse 0.72s ease-in-out infinite alternate;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { to { scale: 1.06; filter: saturate(1.2); } }

    .result {
      display: grid;
      gap: 12px;
    }

    .result-hero {
      min-height: 236px;
      border: 1px solid rgba(255, 247, 232, 0.18);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      display: grid;
      align-items: end;
      background:
        linear-gradient(180deg, rgba(9, 8, 10, 0.1), rgba(9, 8, 10, 0.84)),
        var(--result-image) center 16% / cover no-repeat;
    }

    .result-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 76% 22%, rgba(229, 180, 93, 0.22), transparent 24%),
        radial-gradient(circle at 16% 78%, rgba(32, 164, 134, 0.18), transparent 30%);
      pointer-events: none;
    }

    .result-hero-copy {
      position: relative;
      z-index: 1;
      padding: 16px;
      text-shadow: 0 2px 22px rgba(0, 0, 0, 0.72);
    }

    .result-hero-copy span {
      display: inline-flex;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255, 247, 232, 0.12);
      border: 1px solid rgba(255, 247, 232, 0.16);
      color: #f2d49a;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .result-hero-copy h2 {
      margin: 0;
      font-size: 38px;
      line-height: 1;
      letter-spacing: 0;
    }

    .result-card {
      background: rgba(255, 247, 232, 0.1);
      border: 1px solid rgba(255, 247, 232, 0.18);
      border-radius: var(--radius);
      padding: 15px;
      color: var(--ink);
    }

    .result-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .menu-name {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .fortune-text {
      margin: 10px 0 0;
      color: #dfd1bf;
      line-height: 1.6;
      font-weight: 620;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(229, 180, 93, 0.16);
      color: #f2d49a;
      font-size: 13px;
      font-weight: 800;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary, .secondary, .ghost {
      min-height: 48px;
      border-radius: var(--radius);
      font-weight: 900;
    }

    .primary {
      background: linear-gradient(135deg, #f06b45, #c63829);
      color: white;
      box-shadow: 0 14px 30px rgba(224, 82, 53, 0.3);
    }

    .secondary {
      background: linear-gradient(135deg, #e5b45d, #9b5e25);
      color: #1b120e;
    }

    .ghost {
      background: rgba(255, 247, 232, 0.1);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .step-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 12px;
    }

    .step-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .step-title {
      margin: 4px 0 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      gap: 9px;
    }

    .grid.intent {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid.category {
      grid-template-columns: repeat(2, 1fr);
    }

    .choice {
      min-height: 68px;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.65);
      color: var(--ink);
      display: grid;
      gap: 4px;
      text-align: left;
    }

    .choice.active {
      outline: 2px solid #201916;
      background: #fffdf8;
    }

    .choice.disabled {
      filter: grayscale(1);
      opacity: 0.36;
    }

    .choice b {
      font-size: 14px;
      line-height: 1.25;
    }

    .choice small {
      color: var(--muted);
      font-weight: 800;
    }

    .roulette {
      min-height: 156px;
      border-radius: var(--radius);
      border: 1px dashed rgba(32, 25, 22, 0.3);
      background: rgba(255, 255, 255, 0.52);
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      margin-top: 12px;
    }

    .roulette-word {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1.14;
    }

    .roulette-sub {
      color: var(--muted);
      margin-top: 8px;
      font-weight: 750;
    }

    .restaurant-panel {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .restaurant-panel.active { display: block; }

    .distance-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .distance {
      min-height: 44px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      font-weight: 850;
    }

    dialog {
      width: min(560px, calc(100% - 30px));
      border: 0;
      border-radius: var(--radius);
      padding: 0;
      box-shadow: var(--shadow);
      background: #181311;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    dialog::backdrop {
      background: rgba(20, 13, 9, 0.45);
      backdrop-filter: blur(8px);
    }

    .settings {
      padding: 18px;
    }

    .settings h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .settings p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }

    .field label {
      font-size: 13px;
      font-weight: 900;
      color: #f2d49a;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 247, 232, 0.1);
      color: var(--ink);
      min-height: 44px;
      padding: 10px 11px;
      outline: none;
    }

    .field textarea {
      min-height: 88px;
      resize: vertical;
    }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .footer {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-top: 14px;
      color: #c9b8a7;
      font-size: 13px;
      line-height: 1.5;
    }

    .mini-note {
      background: rgba(255, 247, 232, 0.08);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      backdrop-filter: blur(16px);
    }

    function subjectParticle(text) {

      return (code - 0xac00) % 28 ? "은" : "는";

    function birthElementReading(birthInfo = birthInfoText()) {
      if (!/^\d{6}$/.test(birthInfo)) return null;
      const month = Number(birthInfo.slice(2, 4));
      const day = Number(birthInfo.slice(4, 6));
      if (month < 1 || month > 12 || day < 1 || day > 31) return null;

      const yearElement = yearElementByLastDigit[Number(birthInfo[1])];
      const seasonElement = seasonElementByMonth[month];
      const dayElementKeys = ["water", "wood", "fire", "earth", "metal"];
      const dayElement = dayElementKeys[day % dayElementKeys.length];
      const scores = { wood: 0, fire: 0, earth: 0, metal: 0, water: 0 };
      scores[yearElement] += 2;
      scores[seasonElement] += 2;
      scores[dayElement] += 1;
      const primary = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
      const profile = elementProfiles[primary];

      return {
        code: primary,
        label: profile.label,
        tone: profile.tone,
        menuMood: profile.menuMood,
        reason: profile.reason,
        summary: `${profile.label} ${profile.tone} · ${profile.menuMood}`,

        headers: {

          today: todayKorean(),
          god,
          concern,
          birthInfo,
          elementReading,
          omenSeed: Math.random().toString(36).slice(2, 10),
          menuCandidates: menuCandidates.slice(0, 80)

            <span class="chip">행운 시간 ${escapeHtml(data.luckyTime || "12:26")}</span>
            <span class="chip">조심 ${escapeHtml(data.cautionTag || "아무거나 금지")}</span>
            <span class="chip">운세 날씨 ${escapeHtml(data.fortuneWeather || "맑음 뒤 감칠맛")}</span>
            <span class="chip">곁들임 ${escapeHtml(data.side || "따뜻한 차")}</span>
            ${elementReading ? `<span class="chip">사주맛 ${escapeHtml(elementReading.summary)}</span>` : ""}
            ${birthInfo && !elementReading ? `<span class="chip">사주맛 ${escapeHtml(birthInfo)}</span>` : ""}
            <span class="chip">${todayKorean()}</span>
          </div>
        </article>
        <div class="actions">
          <button class="ghost" type="button" id="backToInput">다시 고르기</button>
          <button class="secondary" type="button" id="findFortuneRestaurant">지도에서 식당 보기</button>
        </div>
      `;
      $("#backToInput").addEventListener("click", showInputScreen);
      $("#findFortuneRestaurant").addEventListener("click", () => showRestaurantPicker($("#fortuneRestaurant"), selectedMenu));
    }

    async function askFortune() {
      const button = $("#askFortune");
      button.disabled = true;
      button.textContent = `${currentGod().name}이 메뉴를 고르는 중...`;
      $("#inputScreen").hidden = true;
      $("#resultScreen").hidden = false;
      $("#fortuneResult").innerHTML = "";
      const god = currentGod();
      $("#fortuneResult").innerHTML = `
        <section class="oracle-loading" style="--loading-image: url('${god.image}')">
          <div class="oracle-loading-content">
            <div class="oracle-loading-mark">${god.emoji}</div>
            <h2>${escapeHtml(god.name)}이<br />점심 운명을 고르는 중</h2>
            <p>오늘의 기운, 고민, 메뉴 후보가 한 냄비에서 끓고 있습니다.</p>
          </div>
        </section>
      `;
      $("#fortuneRestaurant").classList.remove("active");
      $("#fortuneStage").classList.add("is-cooking");

      await new Promise(resolve => setTimeout(resolve, 1200));

      try {
        const data = await aiFortune();
        renderFortuneResult(data);
      } catch (error) {
        renderFortuneResult({
          ...localFortune(),
          theme: "🔮 로컬 점심 판결",
          fortune: "AI 호출이 잠깐 삐끗했지만 점심의 흐름은 멈추지 않습니다. 오늘은 검증된 맛으로 안전하게 가면 오후의 리듬이 살아납니다."
        });
      } finally {
        $("#fortuneStage").classList.remove("is-cooking");
        button.disabled = false;
        button.textContent = "오늘 점심 골라줘";
      }
    }

    function showInputScreen() {
      $("#resultScreen").hidden = true;
      $("#inputScreen").hidden = false;
      $("#fortuneResult").innerHTML = "";
      $("#fortuneRestaurant").classList.remove("active");
    }

    function showRestaurantPicker(root, menu) {
      if (!menu) return;
      const query = encodeURIComponent(`${menu} 맛집`);
      window.open(`https://map.naver.com/p/search/${query}`, "_blank", "noopener,noreferrer");
    }

    function renderGods() {
      const selectedIndex = Math.max(0, gods.findIndex(god => god.id === selectedGodId));
      $("#godCarousel").innerHTML = `
        <div class="god-track" style="transform: translateX(-${selectedIndex * 100}%);">
          ${gods.map(god => `
            <article class="god-slide" aria-hidden="${god.id === selectedGodId ? "false" : "true"}">
              <img src="${god.image}" alt="${god.name}" />
              <div class="god-caption">
                <b>${god.emoji} ${god.name}</b>
                <span>${god.title} · ${god.mood}</span>
              </div>
            </article>
          `).join("")}
        </div>
        <label class="god-lock">
          <input id="lockGod" type="checkbox" ${isGodLocked ? "checked" : ""} />
          선택
        </label>
        <button class="carousel-button prev" type="button" id="prevGod" aria-label="이전 신">‹</button>
        <button class="carousel-button next" type="button" id="nextGod" aria-label="다음 신">›</button>
        <div class="god-dots" aria-hidden="true">
          ${gods.map(god => `<span class="god-dot ${god.id === selectedGodId ? "active" : ""}"></span>`).join("")}
        </div>
      `;
      $("#godCarousel").classList.toggle("is-locked", isGodLocked);

      $("#lockGod").addEventListener("change", event => {
        markUserAction();
        isGodLocked = event.target.checked;
        $("#godCarousel").classList.toggle("is-locked", isGodLocked);
      });

      $("#prevGod").addEventListener("click", () => {
        markUserAction();
        selectGodByOffset(-1);
      });
      $("#nextGod").addEventListener("click", () => {
        markUserAction();
        selectGodByOffset(1);
      });

      let startX = 0;
      let startY = 0;
      const carousel = $("#godCarousel");
      carousel.addEventListener("touchstart", event => {
        markUserAction();
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
      }, { passive: true });
      carousel.addEventListener("touchend", event => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        if (Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy)) {
          markUserAction();
          selectGodByOffset(dx < 0 ? 1 : -1);
        }
      }, { passive: true });
    }

    function selectGodByOffset(offset) {
      if (isGodLocked) return;
      const currentIndex = Math.max(0, gods.findIndex(god => god.id === selectedGodId));
      const nextIndex = (currentIndex + offset + gods.length) % gods.length;
      selectedGodId = gods[nextIndex].id;
      $("#fortuneResult").innerHTML = "";
      $("#fortuneRestaurant").classList.remove("active");
      showInputScreen();
      renderGods();
      renderQuickOfferings();
    }

    function startGodAutoAdvance() {
      if (godAutoTimer) window.clearInterval(godAutoTimer);
      godAutoTimer = window.setInterval(() => {
        const inputScreen = $("#inputScreen");
        const askButton = $("#askFortune");
        const inactiveFor = Date.now() - lastUserActionAt;
        if (!inputScreen || inputScreen.hidden || askButton?.disabled) return;
        if (isGodLocked) return;
        if (inactiveFor < 3000) return;
        lastUserActionAt = Date.now();
        selectGodByOffset(1);
      }, 1000);
    }

    function renderQuickOfferings() {
      const examples = currentGod().prompts || [];

      $("#quickOfferings").innerHTML = `
        ${examples.map(text => `
          <button class="quick-offering" type="button">${escapeHtml(text)}</button>
        `).join("")}
      `;

      $$(".quick-offering").forEach(button => {
        button.addEventListener("click", () => {
          markUserAction();
          $("#concernInput").value = button.textContent.trim();
        });
      });
    }

    $("#birthDateInput").addEventListener("input", event => {
      markUserAction();
      event.target.value = event.target.value.replace(/\D/g, "").slice(0, 6);
    });
    $("#concernInput").addEventListener("input", markUserAction);
    $("#concernInput").addEventListener("focus", markUserAction);
    $("#birthDateInput").addEventListener("focus", markUserAction);
    $("#inputScreen").addEventListener("pointerdown", markUserAction);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    renderGods();
    renderQuickOfferings();
    startGodAutoAdvance();
    $("#askFortune").addEventListener("click", askFortune);
  </script>
</body>
</html>
